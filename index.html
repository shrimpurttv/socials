  <style>
    :root {
      --bg-deep: #120805;
      --bg-mid: #1f0c06;
      --flame-core: #ffcc00;
      --flame-hot: #ff6b1a;
      --flame-edge: #ff3d00;
      --text: #fff5e6;
      --text-dim: rgba(255, 230, 200, 0.75);
      --card: rgba(26, 12, 8, 0.72);
      --card-border: rgba(255, 120, 40, 0.35);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      /* Material-style motion (Google-like) */
      --md-standard: cubic-bezier(0.2, 0, 0, 1);
      --md-emphasized: cubic-bezier(0.2, 0, 0, 1);
      --md-emphasized-decel: cubic-bezier(0.05, 0.7, 0.1, 1);
      --ease-exit: cubic-bezier(0.4, 0, 0.2, 1);
      --twitch: #9146ff;
      --twitch-glow: rgba(145, 70, 255, 0.35);
      /* Charizard palette — ember + wing accent */
      --char-ember: #ff5722;
      --char-blaze: #ff9800;
      --char-gold: #ffcc4d;
      /* Title gradient — soft orange instead of white */
      --title-orange-soft: #ffd4b8;
      --title-orange-bright: #fff0d4;
      --char-wing: #7c9cff;
      --char-slate: #1a0e0a;
      --card-glass: linear-gradient(145deg, rgba(32, 14, 8, 0.78) 0%, rgba(12, 5, 3, 0.88) 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Rajdhani', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body.intro-active { overflow: hidden; }

    /* ========== Opening — Pokéball throw → open → flash (inspired by sprite-style pens) ========== */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: opacity, filter;
    }

    .intro-scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #050201 0%, #120805 100%);
    }

    /* Throw arc: ball enters from lower-left like a toss */
    .intro-poke-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .poke-throw-track {
      transform-origin: center center;
      /* Throw, then snap hidden on flash peak (game-style — ball doesn’t linger) */
      animation:
        pokeThrow 0.95s cubic-bezier(0.25, 0.82, 0.38, 1) forwards,
        pokeVanish 0.06s linear 1.36s forwards;
    }

    @keyframes pokeVanish {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    @keyframes pokeThrow {
      0% {
        opacity: 0;
        transform: translate(-55vw, 42vh) rotate(-52deg) scale(0.35);
      }
      12% { opacity: 1; }
      72% {
        transform: translate(4px, -6px) rotate(4deg) scale(1.04);
      }
      100% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
    }

    .pokeball {
      --pb: 112px;
      --pb-r: 56px;
      width: var(--pb);
      height: var(--pb);
      position: relative;
      border-radius: 50%;
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.35),
        0 12px 32px rgba(0, 0, 0, 0.45),
        inset 0 -3px 8px rgba(0, 0, 0, 0.15);
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.4));
    }

    .poke-half {
      position: absolute;
      left: 0;
      right: 0;
      height: var(--pb-r);
      backface-visibility: hidden;
    }

    .poke-half--top {
      top: 0;
      border-radius: var(--pb-r) var(--pb-r) 0 0;
      background: linear-gradient(165deg, #ff5252 0%, #c62828 55%, #8e1616 100%);
      transform-origin: 50% 100%;
      z-index: 1;
      animation: pokeOpenTop 0.55s var(--md-emphasized-decel) 1.02s forwards;
    }

    .poke-half--bottom {
      bottom: 0;
      border-radius: 0 0 var(--pb-r) var(--pb-r);
      background: linear-gradient(15deg, #fafafa 0%, #e0e0e0 50%, #bdbdbd 100%);
      transform-origin: 50% 0%;
      z-index: 1;
      animation: pokeOpenBot 0.55s var(--md-emphasized-decel) 1.02s forwards;
    }

    @keyframes pokeOpenTop {
      to {
        transform: translateY(-108%) rotate(-14deg);
        opacity: 1;
      }
    }

    @keyframes pokeOpenBot {
      to {
        transform: translateY(108%) rotate(14deg);
        opacity: 1;
      }
    }

    .poke-mid {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 14px;
      margin-top: -7px;
      background: linear-gradient(180deg, #2d2d2d, #0d0d0d);
      z-index: 4;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06);
      animation: pokeMidFade 0.28s ease-out 1s forwards;
    }

    @keyframes pokeMidFade {
      to { opacity: 0; }
    }

    .poke-center-avatar {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 46px;
      height: 46px;
      margin: -23px 0 0 -23px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #1a1a1a;
      box-shadow:
        0 0 0 2px #424242,
        0 4px 14px rgba(0, 0, 0, 0.45);
      z-index: 6;
      background: #1a0a06;
      /* Face hides with parent pokeVanish — no slow shrink */
    }

    .poke-center-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .poke-glare {
      position: absolute;
      top: 10px;
      left: 16px;
      width: 28px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.35), transparent);
      z-index: 3;
      pointer-events: none;
      animation: pokeGlareGo 0.35s ease 1s forwards;
    }

    @keyframes pokeGlareGo {
      to { opacity: 0; }
    }

    /* White burst — snappy peak, then gone (matches game cadence) */
    .intro-burst-flash {
      position: absolute;
      inset: 0;
      z-index: 8;
      background: radial-gradient(
        circle at 50% 50%,
        rgba(255, 255, 255, 0.95) 0%,
        rgba(255, 220, 160, 0.35) 38%,
        transparent 62%
      );
      opacity: 0;
      transform: scale(0.4);
      animation: burstFlash 0.36s cubic-bezier(0.4, 0, 0.2, 1) 1.14s forwards;
    }

    @keyframes burstFlash {
      0% { opacity: 0; transform: scale(0.35); }
      45% { opacity: 1; transform: scale(1.04); }
      100% { opacity: 0; transform: scale(1.45); }
    }

    .intro-tagline {
      position: absolute;
      bottom: 14%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(255, 210, 180, 0.45);
      opacity: 0;
      animation: tagFade 0.5s var(--md-emphasized-decel) 0.15s forwards;
    }

    @keyframes tagFade {
      to { opacity: 1; }
    }

    .intro--exit {
      animation: introLayerExit 0.7s var(--ease-exit) 1.78s forwards;
    }

    @keyframes introLayerExit {
      to {
        opacity: 0;
        filter: blur(12px);
        visibility: hidden;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .poke-throw-track,
      .poke-half--top,
      .poke-half--bottom,
      .poke-mid,
      .poke-glare,
      .intro-burst-flash,
      .intro-tagline { animation: none !important; }
      .poke-throw-track { transform: none; opacity: 1; }
      .poke-half--top,
      .poke-half--bottom { transform: none; opacity: 0; }
      .intro-burst-flash { opacity: 0; }
      .intro { opacity: 0; visibility: hidden; pointer-events: none; }
      .intro--exit { animation: none; }
      body.intro-active { overflow: auto; }
    }

    /* Main content hidden until intro handoff */
    .stage {
      opacity: 0;
      transform: translateY(10px) scale(0.992);
      filter: blur(5px);
      transition:
        opacity 0.8s var(--md-emphasized-decel),
        transform 0.8s var(--md-emphasized-decel),
        filter 0.75s var(--md-standard);
    }

    body.intro-done .stage {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .stage { opacity: 1; transform: none; filter: none; }
    }

    /* Background — Charizard art + tint (noise / vignette / embers stay on top in DOM) */
    .fire-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-color: var(--bg-deep);
      background-image: url('char.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .fire-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        180deg,
        rgba(5, 2, 1, 0.78) 0%,
        rgba(14, 6, 4, 0.62) 45%,
        rgba(6, 2, 1, 0.76) 100%
      );
    }

    .embers {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .ember {
      position: absolute;
      bottom: -20px;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, var(--flame-core), transparent);
      border-radius: 50%;
      opacity: 0;
      animation: rise linear infinite;
    }

    @keyframes rise {
      0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      10% { opacity: 0.85; }
      100% { transform: translateY(-100vh) translateX(var(--drift)) scale(0.2); opacity: 0; }
    }

    .grid-noise {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      /* Edge darkening only — center stays neutral (no top oval) */
      background: radial-gradient(ellipse 100% 90% at 50% 50%, transparent 45%, rgba(0, 0, 0, 0.5) 100%);
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 6rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .poke-badge {
      width: 104px;
      height: 104px;
      margin: 0 auto 1.1rem;
      position: relative;
      animation: floaty 4.5s ease-in-out infinite;
      animation-delay: 0s;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .poke-badge::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(from 200deg, var(--flame-edge), var(--flame-hot), var(--flame-core), var(--flame-hot), var(--flame-edge));
      animation: spin 8s linear infinite;
      opacity: 0.82;
      filter: blur(2px);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .poke-inner {
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #3a1810 0%, #1a0a06 70%);
      border: 3px solid rgba(255, 180, 80, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow:
        inset 0 0 22px rgba(255, 100, 30, 0.28),
        0 0 22px rgba(255, 80, 20, 0.34);
    }

    .poke-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    @keyframes titleFireGradient {
      0% {
        background-position: 0% 50%;
      }
      100% {
        background-position: 100% 50%;
      }
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.35rem, 5vw, 1.8rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background-image: linear-gradient(
        105deg,
        var(--title-orange-soft) 0%,
        var(--title-orange-bright) 12%,
        var(--flame-core) 24%,
        var(--char-gold) 36%,
        var(--flame-hot) 48%,
        var(--flame-edge) 56%,
        var(--flame-hot) 64%,
        var(--char-gold) 76%,
        var(--flame-core) 88%,
        var(--title-orange-bright) 96%,
        var(--title-orange-soft) 100%
      );
      background-size: 280% 100%;
      background-repeat: no-repeat;
      animation: titleFireGradient 8s ease-in-out infinite alternate;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      filter: drop-shadow(0 0 16px rgba(255, 100, 40, 0.45));
    }

    @media (prefers-reduced-motion: reduce) {
      h1 {
        animation: none;
        background-image: linear-gradient(135deg, var(--title-orange-bright) 0%, var(--flame-core) 45%, var(--flame-hot) 100%);
        background-size: 100% 100%;
      }
    }

    .subtitle {
      font-size: 0.92rem;
      color: var(--text-dim);
      margin-top: 0.4rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .subtitle span {
      color: var(--flame-hot);
      font-weight: 700;
    }

    .links-section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255, 180, 100, 0.42);
      margin-bottom: 0.75rem;
      text-align: center;
      width: 100%;
    }

    .links-section-title span {
      color: var(--char-wing);
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      align-items: stretch;
    }

    .link-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      text-align: left;
      gap: 0.65rem;
      min-height: 0;
      padding: 0.42rem 0.65rem 0.42rem 0.5rem;
      background: var(--card-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 100, 50, 0.16);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition:
        transform 0.35s var(--ease),
        border-color 0.3s,
        box-shadow 0.35s;
      animation: cardIn 0.7s var(--ease) both;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 2px 12px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 220, 160, 0.05);
    }

    .link-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 10px 0 0 10px;
      background: linear-gradient(
        180deg,
        var(--char-gold) 0%,
        var(--char-blaze) 45%,
        var(--char-ember) 100%
      );
      opacity: 0.85;
    }

    .link-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 35%, rgba(255, 140, 60, 0.05) 50%, transparent 65%);
      transform: translateX(-100%);
      transition: transform 0.75s var(--ease);
      pointer-events: none;
    }

    .link-card:hover::after {
      transform: translateX(100%);
    }

    .link-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 150, 80, 0.35);
      box-shadow:
        0 10px 28px rgba(255, 50, 0, 0.12),
        0 0 0 1px rgba(255, 200, 100, 0.08);
    }

    .link-card:focus-visible {
      outline: 2px solid var(--char-gold);
      outline-offset: 2px;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .link-card:nth-child(1) { animation-delay: 0.05s; }
    .link-card:nth-child(2) { animation-delay: 0.12s; }
    .link-card:nth-child(3) { animation-delay: 0.19s; }
    .link-card:nth-child(4) { animation-delay: 0.26s; }
    .link-card:nth-child(5) { animation-delay: 0.33s; }
    .link-card:nth-child(6) { animation-delay: 0.4s; }

    body:not(.intro-done) .link-card {
      animation: none;
      opacity: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      body:not(.intro-done) .link-card { opacity: 1; animation: none; }
    }

    .icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: radial-gradient(circle at 30% 25%, rgba(255, 200, 100, 0.12) 0%, transparent 55%),
        linear-gradient(155deg, rgba(45, 20, 12, 0.92) 0%, rgba(14, 6, 4, 0.96) 100%);
      border: 1px solid rgba(255, 130, 70, 0.22);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: transform 0.3s var(--ease), border-color 0.3s;
    }

    .link-card:hover .icon-wrap {
      transform: scale(1.04);
    }

    .icon-wrap svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .ig {
      color: #ff7eb3;
      border-color: rgba(255, 120, 160, 0.35);
    }
    .ig2 {
      color: #ffb74d;
      border-color: rgba(255, 180, 90, 0.35);
    }
    .twitch {
      color: var(--twitch);
      border-color: rgba(145, 70, 255, 0.45);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 20px var(--twitch-glow);
    }
    .ig3 {
      color: #81c784;
      border-color: rgba(120, 200, 140, 0.35);
    }
    .tw {
      color: #e7e9ea;
      border-color: rgba(200, 210, 220, 0.25);
    }
    .tt {
      color: #5ee8e0;
      border-color: rgba(80, 230, 220, 0.35);
    }

    .link-text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.02rem;
      justify-content: center;
    }

    .link-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: rgba(255, 190, 110, 0.48);
      text-transform: uppercase;
      line-height: 1.2;
    }

    .link-handle {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-meta {
      font-size: 0.58rem;
      font-weight: 600;
      color: rgba(255, 200, 170, 0.36);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .chev {
      flex-shrink: 0;

      width: 100%;

  <script>
    (function embers() {
      const el = document.getElementById('embers');
      if (!el) return;
      const N = 32;
      for (let i = 0; i < N; i++) {
        const s = document.createElement('span');
        s.className = 'ember';
        s.style.left = Math.random() * 100 + '%';
        s.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
        s.style.animationDuration = (8 + Math.random() * 14) + 's';
        s.style.animationDelay = (Math.random() * 8) + 's';
        el.appendChild(s);
      }
    })();

    /* Intro: end sequence → show main UI */
    (function introController() {
      const intro = document.getElementById('pageIntro');
      const mq = window.matchMedia('(prefers-reduced-motion: reduce)');

      function finishIntro() {
        document.body.classList.remove('intro-active');
        document.body.classList.add('intro-done');
      }

      if (mq.matches) {
        finishIntro();
        if (intro) intro.remove();
        return;
      }

      if (intro) {
        intro.addEventListener('animationend', function onEnd(e) {
          if (e.target !== intro || e.animationName !== 'introLayerExit') return;
          intro.removeEventListener('animationend', onEnd);
          intro.remove();
          finishIntro();
        });
        requestAnimationFrame(() => {
          intro.classList.add('intro--exit');
        });
        setTimeout(() => {
          if (intro && intro.parentNode) {
            intro.remove();
            finishIntro();
          }
        }, 2200);
      } else {
        finishIntro();
      }
    })();

    const tapHint = document.getElementById('tapHint');

    /* Background audio — same pattern as trag.html: click page to start, m.mp3 next to this file */
    (function audioPlayer() {
      const audio = document.getElementById('bg-audio');
      const volumeSlider = document.getElementById('volumeSlider');
      const volLabel = document.getElementById('volLabel');

      const CANDIDATES = [{ url: 'm.mp3', type: 'audio/mpeg' }];

      audio.loop = true;
      audio.preload = 'auto';

      function showToast(msg, t) {
        t = t || 2800;
        var el = document.getElementById('bio-toast');
        if (!el) {
          el = document.createElement('div');
          el.id = 'bio-toast';
          el.setAttribute('role', 'status');
          el.style.cssText =
            'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.78);border:1px solid rgba(255,120,40,0.2);color:var(--flame-core);padding:8px 14px;border-radius:10px;z-index:9999;font-size:12px;max-width:90vw;text-align:center;transition:opacity .3s';
          document.body.appendChild(el);
        }
        el.textContent = msg;
        el.style.opacity = '1';
        setTimeout(function () {
          el.style.opacity = '0';
        }, t);
      }

      function setVolume(v) {
        audio.volume = v;
        if (volLabel) volLabel.textContent = Math.round(v * 100) + '%';
        audio.muted = false;
      }

      if (volumeSlider) {
        setVolume(parseFloat(volumeSlider.value || 0.32));
        volumeSlider.addEventListener('input', function (e) {
          setVolume(parseFloat(e.target.value));
        });
      }

      function mimeSupported(mime) {
        try {
          var r = audio.canPlayType(mime);
          return r === 'probably' || r === 'maybe';
        } catch (e) {
          return false;
        }
      }

      function setAudioSrc(url) {
        Array.from(audio.querySelectorAll('source')).forEach(function (s) {
          s.remove();
        });
        audio.src = url;
        try {
          audio.load();
        } catch (e) {}
      }

      async function findAndLoadSources() {
        var loaded = [];
        for (var i = 0; i < CANDIDATES.length; i++) {
          var c = CANDIDATES[i];
          if (!c || !c.url) continue;
          if (!mimeSupported(c.type)) continue;
          var use = true;
          try {
            var res = await fetch(c.url, { method: 'HEAD', cache: 'no-cache' });
            if (!res.ok) use = false;
          } catch (err) {
            use = true;
          }
          if (use) loaded.push(c.url);
        }
        if (loaded.length === 0 && mimeSupported('audio/mpeg')) {
          return ['m.mp3'];
        }
        return loaded;
      }

      async function playFromUserGesture() {
        try {
          var chosen = await findAndLoadSources();
          if (!chosen || chosen.length === 0) {
            showToast('Add m.mp3 next to this HTML file.', 4000);
            return false;
          }
          setAudioSrc(chosen[0]);
          audio.muted = false;
          await audio.play();
          if (tapHint) tapHint.style.display = 'none';
          return true;
        } catch (err) {
          showToast('Playback failed — try again', 3000);
          return false;
        }
      }

      var audioUnlocked = false;
      function unlockAudioOnGesture() {
        if (audioUnlocked) return;
        try {
          var AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) {
            audioUnlocked = true;
            return;
          }
          var ctx = new AC();
          if (ctx.state === 'suspended') ctx.resume();
          var b = ctx.createBuffer(1, 1, 22050);
          var src = ctx.createBufferSource();
          src.buffer = b;
          src.connect(ctx.destination);
          src.start(0);
        } catch (e) {}
        audioUnlocked = true;
      }
      document.body.addEventListener('pointerdown', unlockAudioOnGesture, { once: true, passive: true });

      document.body.addEventListener(
        'click',
        async function onBodyClick() {
          if (!document.body.classList.contains('intro-done')) return;
          if (!audio.paused) return;
          try {
            await playFromUserGesture();
          } catch (e) {}
        },
        { passive: true }
      );

      audio.addEventListener('error', function () {
        showToast('Audio error — is m.mp3 in the same folder?', 3500);
      });
    })();
  </script>
