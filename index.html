<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Socials</title>
  <link rel="icon" href="https://static-cdn.jtvnw.net/jtv_user_pictures/b3b01984-7688-4162-b898-1834ea89f162-profile_image-70x70.png" sizes="70x70" type="image/png">
  <link rel="apple-touch-icon" href="https://static-cdn.jtvnw.net/jtv_user_pictures/b3b01984-7688-4162-b898-1834ea89f162-profile_image-70x70.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #120805;
      --bg-mid: #1f0c06;
      --flame-core: #ffcc00;
      --flame-hot: #ff6b1a;
      --flame-edge: #ff3d00;
      --text: #fff5e6;
      --text-dim: rgba(255, 230, 200, 0.75);
      --card: rgba(26, 12, 8, 0.72);
      --card-border: rgba(255, 120, 40, 0.35);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      /* Material-style motion (Google-like) */
      --md-standard: cubic-bezier(0.2, 0, 0, 1);
      --md-emphasized: cubic-bezier(0.2, 0, 0, 1);
      --md-emphasized-decel: cubic-bezier(0.05, 0.7, 0.1, 1);
      --ease-exit: cubic-bezier(0.4, 0, 0.2, 1);
      --twitch: #9146ff;
      --twitch-glow: rgba(145, 70, 255, 0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Rajdhani', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body.intro-active { overflow: hidden; }

    /* ========== Opening — Pokéball throw → open → flash (inspired by sprite-style pens) ========== */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: opacity, filter;
    }

    .intro-scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #050201 0%, #120805 100%);
    }

    /* Throw arc: ball enters from lower-left like a toss */
    .intro-poke-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .poke-throw-track {
      animation: pokeThrow 0.95s cubic-bezier(0.25, 0.82, 0.38, 1) forwards;
      transform-origin: center center;
    }

    @keyframes pokeThrow {
      0% {
        opacity: 0;
        transform: translate(-55vw, 42vh) rotate(-52deg) scale(0.35);
      }
      12% { opacity: 1; }
      72% {
        transform: translate(4px, -6px) rotate(4deg) scale(1.04);
      }
      100% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
    }

    .pokeball {
      --pb: 112px;
      --pb-r: 56px;
      width: var(--pb);
      height: var(--pb);
      position: relative;
      border-radius: 50%;
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.35),
        0 12px 32px rgba(0, 0, 0, 0.45),
        inset 0 -3px 8px rgba(0, 0, 0, 0.15);
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.4));
    }

    .poke-half {
      position: absolute;
      left: 0;
      right: 0;
      height: var(--pb-r);
      backface-visibility: hidden;
    }

    .poke-half--top {
      top: 0;
      border-radius: var(--pb-r) var(--pb-r) 0 0;
      background: linear-gradient(165deg, #ff5252 0%, #c62828 55%, #8e1616 100%);
      transform-origin: 50% 100%;
      z-index: 1;
      animation: pokeOpenTop 0.55s var(--md-emphasized-decel) 1.02s forwards;
    }

    .poke-half--bottom {
      bottom: 0;
      border-radius: 0 0 var(--pb-r) var(--pb-r);
      background: linear-gradient(15deg, #fafafa 0%, #e0e0e0 50%, #bdbdbd 100%);
      transform-origin: 50% 0%;
      z-index: 1;
      animation: pokeOpenBot 0.55s var(--md-emphasized-decel) 1.02s forwards;
    }

    @keyframes pokeOpenTop {
      to {
        transform: translateY(-108%) rotate(-14deg);
        opacity: 0.92;
      }
    }

    @keyframes pokeOpenBot {
      to {
        transform: translateY(108%) rotate(14deg);
        opacity: 0.92;
      }
    }

    .poke-mid {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 14px;
      margin-top: -7px;
      background: linear-gradient(180deg, #2d2d2d, #0d0d0d);
      z-index: 4;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06);
      animation: pokeMidFade 0.28s ease-out 1s forwards;
    }

    @keyframes pokeMidFade {
      to { opacity: 0; }
    }

    .poke-center-avatar {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 46px;
      height: 46px;
      margin: -23px 0 0 -23px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #1a1a1a;
      box-shadow:
        0 0 0 2px #424242,
        0 4px 14px rgba(0, 0, 0, 0.45);
      z-index: 6;
      background: #1a0a06;
      animation: pokeFaceRelease 0.55s var(--md-emphasized-decel) 1.02s forwards;
    }

    .poke-center-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @keyframes pokeFaceRelease {
      to {
        opacity: 0;
        transform: scale(0.35);
      }
    }

    .poke-glare {
      position: absolute;
      top: 10px;
      left: 16px;
      width: 28px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.35), transparent);
      z-index: 3;
      pointer-events: none;
      animation: pokeGlareGo 0.35s ease 1s forwards;
    }

    @keyframes pokeGlareGo {
      to { opacity: 0; }
    }

    /* White burst — classic “release” flash */
    .intro-burst-flash {
      position: absolute;
      inset: 0;
      z-index: 8;
      background: radial-gradient(
        circle at 50% 50%,
        rgba(255, 255, 255, 0.95) 0%,
        rgba(255, 220, 160, 0.35) 38%,
        transparent 62%
      );
      opacity: 0;
      transform: scale(0.4);
      animation: burstFlash 0.5s var(--ease-exit) 1.18s forwards;
    }

    @keyframes burstFlash {
      0% { opacity: 0; }
      35% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0; transform: scale(1.5); }
    }

    .intro-tagline {
      position: absolute;
      bottom: 14%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(255, 210, 180, 0.45);
      opacity: 0;
      animation: tagFade 0.5s var(--md-emphasized-decel) 0.15s forwards;
    }

    @keyframes tagFade {
      to { opacity: 1; }
    }

    .intro--exit {
      animation: introLayerExit 0.7s var(--ease-exit) 1.78s forwards;
    }

    @keyframes introLayerExit {
      to {
        opacity: 0;
        filter: blur(12px);
        visibility: hidden;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .poke-throw-track,
      .poke-half--top,
      .poke-half--bottom,
      .poke-mid,
      .poke-center-avatar,
      .poke-glare,
      .intro-burst-flash,
      .intro-tagline { animation: none !important; }
      .poke-throw-track { transform: none; opacity: 1; }
      .poke-half--top,
      .poke-half--bottom { transform: none; opacity: 0; }
      .intro-burst-flash { opacity: 0; }
      .intro { opacity: 0; visibility: hidden; pointer-events: none; }
      .intro--exit { animation: none; }
      body.intro-active { overflow: auto; }
    }

    /* Main content hidden until intro handoff */
    .stage {
      opacity: 0;
      transform: translateY(10px) scale(0.992);
      filter: blur(5px);
      transition:
        opacity 0.8s var(--md-emphasized-decel),
        transform 0.8s var(--md-emphasized-decel),
        filter 0.75s var(--md-standard);
    }

    body.intro-done .stage {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .stage { opacity: 1; transform: none; filter: none; }
    }

    /* Background — flat gradient only (no orange oval blobs) */
    .fire-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(180deg, #080402 0%, var(--bg-mid) 48%, #160a06 100%);
    }

    .embers {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .ember {
      position: absolute;
      bottom: -20px;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, var(--flame-core), transparent);
      border-radius: 50%;
      opacity: 0;
      animation: rise linear infinite;
    }

    @keyframes rise {
      0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      10% { opacity: 0.85; }
      100% { transform: translateY(-100vh) translateX(var(--drift)) scale(0.2); opacity: 0; }
    }

    .grid-noise {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      /* Edge darkening only — center stays neutral (no top oval) */
      background: radial-gradient(ellipse 100% 90% at 50% 50%, transparent 45%, rgba(0, 0, 0, 0.5) 100%);
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 6rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .poke-badge {
      width: 104px;
      height: 104px;
      margin: 0 auto 1.1rem;
      position: relative;
      animation: floaty 4.5s ease-in-out infinite;
      animation-delay: 0s;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .poke-badge::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: conic-gradient(from 200deg, var(--flame-edge), var(--flame-hot), var(--flame-core), var(--flame-hot), var(--flame-edge));
      animation: spin 8s linear infinite;
      opacity: 0.82;
      filter: blur(3px);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .poke-inner {
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #3a1810 0%, #1a0a06 70%);
      border: 3px solid rgba(255, 180, 80, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow:
        inset 0 0 28px rgba(255, 100, 30, 0.28),
        0 0 44px rgba(255, 80, 20, 0.38);
    }

    .poke-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.35rem, 5vw, 1.8rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 0%, var(--flame-core) 45%, var(--flame-hot) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(255, 100, 40, 0.5));
    }

    .subtitle {
      font-size: 0.92rem;
      color: var(--text-dim);
      margin-top: 0.4rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .subtitle span {
      color: var(--flame-hot);
      font-weight: 700;
    }

    .links {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.65rem;
      align-items: stretch;
    }

    @media (max-width: 400px) {
      .links {
        grid-template-columns: 1fr;
      }
    }

    .link-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      gap: 0.45rem;
      min-height: 100%;
      padding: 0.85rem 0.65rem 0.95rem;
      background: var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition:
        transform 0.35s var(--ease),
        border-color 0.35s,
        box-shadow 0.35s,
        background 0.35s;
      animation: cardIn 0.7s var(--ease) both;
      position: relative;
      overflow: hidden;
    }

    .link-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 120, 40, 0.09), transparent);
      transform: translateX(-100%);
      transition: transform 0.65s var(--ease);
    }

    .link-card:hover::after {
      transform: translateX(100%);
    }

    .link-card:hover {
      transform: translateY(-2px) scale(1.015);
      border-color: rgba(255, 160, 80, 0.65);
      box-shadow:
        0 14px 42px rgba(255, 60, 0, 0.22),
        0 0 0 1px rgba(255, 200, 100, 0.12);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .link-card:nth-child(1) { animation-delay: 0.05s; }
    .link-card:nth-child(2) { animation-delay: 0.12s; }
    .link-card:nth-child(3) { animation-delay: 0.19s; }
    .link-card:nth-child(4) { animation-delay: 0.26s; }
    .link-card:nth-child(5) { animation-delay: 0.33s; }
    .link-card:nth-child(6) { animation-delay: 0.4s; }

    body:not(.intro-done) .link-card {
      animation: none;
      opacity: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      body:not(.intro-done) .link-card { opacity: 1; animation: none; }
    }

    .icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: linear-gradient(145deg, rgba(255, 100, 40, 0.22), rgba(40, 15, 8, 0.92));
      border: 1px solid rgba(255, 140, 60, 0.35);
      box-shadow: 0 0 20px rgba(255, 80, 30, 0.12);
    }

    .icon-wrap svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .ig { color: #ff6b9d; }
    .ig2 { color: #ffa726; }
    .twitch { color: var(--twitch); box-shadow: 0 0 22px var(--twitch-glow); }
    .ig3 { color: #66bb6a; }
    .tw { color: #e7e9ea; }
    .tt { color: #00f2ea; }

    .link-text {
      flex: 1;
      min-width: 0;
      width: 100%;
    }

    .link-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--flame-core);
      text-transform: uppercase;
      margin-bottom: 0.08rem;
    }

    .link-handle {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.25;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    .link-meta {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 0.12rem;
    }

    .chev {
      display: none;
    }

    footer {
      margin-top: auto;
      padding-top: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255, 200, 160, 0.32);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .audio-ctrl {
      position: fixed;
      bottom: 1.25rem;
      left: 1.25rem;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: rgba(18, 8, 4, 0.94);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 100, 40, 0.35);
      border-radius: 10px;
      box-shadow: 0 0 28px rgba(255, 60, 0, 0.2);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
    }

    body.intro-done .audio-ctrl {
      opacity: 1;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .audio-ctrl { opacity: 1; transform: none; }
    }

    .play-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(40, 18, 10, 0.9);
      border: 1px solid rgba(255, 120, 50, 0.4);
      border-radius: 8px;
      color: var(--flame-core);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .play-btn:hover {
      box-shadow: 0 0 18px rgba(255, 120, 40, 0.45);
      transform: scale(1.06);
    }

    .play-btn svg { width: 15px; height: 15px; }

    .play-btn .icon-pause { display: none; }
    .play-btn .icon-play { display: block; }
    .play-btn:not(.paused) .icon-pause { display: block; }
    .play-btn:not(.paused) .icon-play { display: none; }

    .vol-wrap { display: flex; align-items: center; gap: 0.45rem; }
    .vol-wrap span {
      font-size: 0.65rem;
      color: rgba(255, 180, 120, 0.55);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-family: 'Orbitron', sans-serif;
    }

    .vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 88px;
      height: 4px;
      background: rgba(60, 25, 15, 0.9);
      border-radius: 2px;
      outline: none;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, var(--flame-core), var(--flame-hot));
      border-radius: 3px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 140, 40, 0.6);
    }

    .vol-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, var(--flame-core), var(--flame-hot));
      border-radius: 3px;
      cursor: pointer;
      border: none;
    }

    .hint {
      position: fixed;
      bottom: 5.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      font-size: 0.68rem;
      color: rgba(255, 200, 160, 0.38);
      letter-spacing: 0.08em;
      animation: pulseHint 2.5s ease-in-out infinite;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }

    body.intro-done .hint { opacity: 1; }

    @keyframes pulseHint {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.85; }
    }
  </style>
</head>
<body class="intro-active">
  <!-- Opening: throw → Pokéball opens → flash (links reveal after) — vibe: simeydotme-style sprite motion -->
  <div class="intro" id="pageIntro" aria-hidden="true">
    <div class="intro-scrim" aria-hidden="true"></div>
    <p class="intro-tagline">I choose you</p>
    <div class="intro-poke-wrap">
      <div class="poke-throw-track">
        <div class="pokeball" aria-hidden="true">
          <div class="poke-half poke-half--top"></div>
          <div class="poke-half poke-half--bottom"></div>
          <div class="poke-glare"></div>
          <div class="poke-mid"></div>
          <div class="poke-center-avatar">
            <img
              src="https://static-cdn.jtvnw.net/jtv_user_pictures/b3b01984-7688-4162-b898-1834ea89f162-profile_image-70x70.png"
              alt=""
              width="46"
              height="46"
              loading="eager"
              decoding="async"
            />
          </div>
        </div>
      </div>
    </div>
    <div class="intro-burst-flash" aria-hidden="true"></div>
  </div>

  <div class="fire-bg" aria-hidden="true"></div>
  <div class="grid-noise" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="embers" id="embers" aria-hidden="true"></div>

  <audio id="bgmusic" preload="auto" playsinline loop></audio>

  <div class="wrap stage" id="mainStage">
    <header class="brand">
      <div class="poke-badge">
        <div class="poke-inner">
          <img
            src="https://static-cdn.jtvnw.net/jtv_user_pictures/b3b01984-7688-4162-b898-1834ea89f162-profile_image-70x70.png"
            alt="Profile"
            width="86"
            height="86"
            loading="eager"
            decoding="async"
          />
        </div>

  <script>
    (function embers() {
      const el = document.getElementById('embers');
      if (!el) return;
      const N = 32;
      for (let i = 0; i < N; i++) {
        const s = document.createElement('span');
        s.className = 'ember';
        s.style.left = Math.random() * 100 + '%';
        s.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
        s.style.animationDuration = (8 + Math.random() * 14) + 's';
        s.style.animationDelay = (Math.random() * 8) + 's';
        el.appendChild(s);
      }
    })();

    /* Intro: end sequence → show main UI */
    (function introController() {
      const intro = document.getElementById('pageIntro');
      const mq = window.matchMedia('(prefers-reduced-motion: reduce)');

      function finishIntro() {
        document.body.classList.remove('intro-active');
        document.body.classList.add('intro-done');
      }

      if (mq.matches) {
        finishIntro();
        if (intro) intro.remove();
        return;
      }

      if (intro) {
        intro.addEventListener('animationend', function onEnd(e) {
          if (e.target !== intro || e.animationName !== 'introLayerExit') return;
          intro.removeEventListener('animationend', onEnd);
          intro.remove();
          finishIntro();
        });
        requestAnimationFrame(() => {
          intro.classList.add('intro--exit');
        });
        setTimeout(() => {
          if (intro && intro.parentNode) {
            intro.remove();
            finishIntro();
          }
        }, 3000);
      } else {
        finishIntro();
      }
    })();

    const audio = document.getElementById('bgmusic');
    const playBtn = document.getElementById('playbtn');
    const volSlider = document.getElementById('vol');
    const tapHint = document.getElementById('tapHint');

    const CANDIDATES = [
      { url: 'https://r2.guns.lol/7fdd2ffd-dcaa-41d0-93b1-5e4bc914206d.mp3', type: 'audio/mpeg' },
      { url: 'https://r2.guns.lol/97f40c6a-2261-4e77-8961-927cb56957e5.mp3', type: 'audio/mpeg' },
    ];

    function setAudioSrc(url) {
      audio.querySelectorAll('source').forEach(s => s.remove());
      audio.src = url;
      try { audio.load(); } catch (e) {}
    }

    function mimeSupported(mime) {
      try {
        const r = audio.canPlayType(mime);
        return r === 'probably' || r === 'maybe';
      } catch (e) { return false; }
    }

    async function findAndLoadSources() {
      const loaded = [];
      for (const c of CANDIDATES) {
        if (!c || !c.url) continue;
        if (!mimeSupported(c.type)) continue;
        let ok = true;
        try {
          const res = await fetch(c.url, { method: 'HEAD', cache: 'no-cache' });
          if (!res.ok) ok = false;
        } catch (err) {}
        if (!ok) continue;
        loaded.push(c.url);
      }
      return loaded;
    }

    let audioLoaded = false;
    async function playFromUserGesture() {
      if (audioLoaded && audio.src) {
        try {
          await audio.play();
          playBtn.classList.remove('paused');
          if (tapHint) tapHint.style.display = 'none';
          return true;
        } catch (e) { return false; }
      }
      try {
        const chosen = await findAndLoadSources();
        if (!chosen || chosen.length === 0) return false;
        setAudioSrc(chosen[0]);
        audioLoaded = true;
        await audio.play();
        playBtn.classList.remove('paused');
        if (tapHint) tapHint.style.display = 'none';
        return true;
      } catch (err) {
        return false;
      }
    }

    function unlockAudioOnGesture() {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        const ctx = new AC();
        if (ctx.state === 'suspended') ctx.resume();
        const b = ctx.createBuffer(1, 1, 22050);
        const src = ctx.createBufferSource();
        src.buffer = b;
        src.connect(ctx.destination);
        src.start(0);
      } catch (e) {}
    }
    document.body.addEventListener('pointerdown', unlockAudioOnGesture, { once: true, passive: true });

    document.addEventListener('click', function () {
      if (audio.paused) playFromUserGesture().then(() => {});
    }, { once: true });
    document.addEventListener('keydown', function () {
      if (audio.paused) playFromUserGesture().then(() => {});
    }, { once: true });

    playBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (audio.paused) {
        playFromUserGesture().then(() => {});
      } else {
        audio.pause();
        playBtn.classList.add('paused');
      }
    });

    volSlider.addEventListener('input', () => {
      audio.volume = volSlider.value / 100;
    });
    audio.volume = volSlider.value / 100;
  </script>
